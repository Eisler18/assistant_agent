[project]
name = "assistant-agent"
version = "0.1.0"
description = "Small project for master's degree thesis at Universidad Politecnica de Madrid"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "dateparser>=1.3.0",
    "gradio>=6.9.0",
    "langchain-core>=1.2.20",
    "langgraph>=1.1.3",
    "pydantic>=2.12.5",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
]
